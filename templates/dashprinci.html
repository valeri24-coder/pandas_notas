<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Académico</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root {
  --navy: #0f1e3d;
  --navy-mid: #1a3160;
  --blue: #2451b7;
  --blue-light: #3b6fd4;
  --accent: #4f9cf9;

  --danger: #e63946;
  --danger-soft: #fff0f0;

  --success: #2a9d5c;

  --bg: #f0f4fc;

  --surface: #ffffff;
  --surface2: #f7f9fe;

  --border: #dce5f5;

  --text: #1a2440;
  --text-mid: #4a5775;
  --text-light: #8a96b0;

  --radius: 12px;
  --radius-sm: 8px;

  --shadow: 0 2px 16px rgba(15,30,61,0.09);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--navy);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 24px rgba(10,20,50,0.22);
}

.header-left { display: flex; align-items: center; gap: 20px; }

.logo {
  font-family: 'Sora', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
}

.welcome {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.5);
  padding-left: 20px;
  border-left: 1px solid rgba(255,255,255,0.12);
}

.welcome span { color: rgba(255,255,255,0.85); font-weight: 500; }

nav { display: flex; align-items: center; gap: 4px; }

nav a {
  font-size: 0.82rem;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  padding: 7px 13px;
  border-radius: 8px;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 6px;
}

nav a:hover { background: rgba(255,255,255,0.1); color: white; }

nav a.danger { color: #ff8a8a; margin-left: 8px; }

nav a.danger:hover { background: rgba(230,57,70,0.18); color: #ffaaaa; }

.page { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }


.risk-alert {
  background: var(--surface);
  border: 1px solid #fcccd0;
  border-left: 4px solid var(--danger);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 24px;
}

.risk-alert-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--danger-soft);
}

.risk-alert-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--danger);
}

.risk-alert-badge {
  background: var(--danger);
  color: white;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}


.risk-table-wrap{
  max-height:220px;
  overflow-y:auto;
}


table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
}

thead th {
  background: var(--navy);
  color: rgba(255,255,255,0.85);
  font-size: 0.74rem;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 11px 20px;
  text-align: left;
}

tbody td {
  padding: 12px 20px;
  font-size: 0.87rem;
  color: var(--text-mid);
  border-bottom: 1px solid var(--border);
}

tbody tr:last-child td { border-bottom: none; }

tbody tr:hover { background: #fef6f6; }

.badge-danger {
  display: inline-block;
  background: #ffebeb;
  color: var(--danger);
  font-size: 0.75rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}

.iframe-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

iframe { border: none; display: block; }

</style>
</head>

<body>

<header> <div class="header-left"> <div class="logo"><div class="logo-dot"></div> Dashboard</div> <div class="welcome">Hola, <span>{{ usuario }}</span></div> </div> <nav> <a href="/registro_estudiante"> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Registrar </a> <a href="/carga_masiva"> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg> Cargar </a> <a href="/ranking"> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Ranking </a> <a href="/logout" class="danger"> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Salir </a> </nav> </header>

<div class="page">

{% if total_riesgo > 0 %}

<div class="risk-alert">

<div class="risk-alert-header">

<div class="risk-alert-title">
⚠️ Alerta de Riesgo Académico
<span class="risk-alert-badge">{{ total_riesgo }} estudiante(s)</span>
</div>

</div>

<div class="risk-table-wrap">

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Carrera</th>
<th>Promedio</th>
</tr>
</thead>

<tbody>
{% for est in estudiantes_riesgo %}
<tr>
<td>{{ est.nombre }}</td>
<td>{{ est.carrera }}</td>
<td><span class="badge-danger">{{ est.promedio }}</span></td>
</tr>
{% endfor %}
</tbody>

</table>

</div>

</div>

{% endif %}

<div class="iframe-wrap">
<iframe src="/dashprincipal/" width="100%" height="800px"></iframe>
</div>

</div>

</body>
</html>
