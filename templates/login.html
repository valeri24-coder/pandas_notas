<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

:root{
--navy:#0f1e3d;
--blue:#2451b7;
--accent:#4f9cf9;
--bg:#f0f4fc;
--border:#dce5f5;
--text:#1a2440;
}

body{
margin:0;
font-family:'DM Sans', Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,var(--navy),var(--blue));
}

/* CAJA LOGIN */

.login-box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 15px 35px rgba(15,30,61,0.25);
width:340px;
text-align:center;
}

/* TITULO */

h1{
margin-bottom:25px;
color:var(--navy);
font-size:26px;
}

/* LABEL */

label{
display:block;
text-align:left;
margin-top:14px;
font-weight:600;
color:var(--text);
}

/* INPUT */

input{
width:100%;
padding:11px;
margin-top:6px;
border-radius:8px;
border:1px solid var(--border);
outline:none;
font-size:14px;
transition:0.25s;
}

input:focus{
border-color:var(--accent);
box-shadow:0 0 6px rgba(79,156,249,0.5);
}

/* BOTON */

button{
margin-top:22px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--blue);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

button:hover{
background:var(--navy);
transform:scale(1.03);
}

/* TEXTO ABAJO */

.footer-text{
margin-top:15px;
font-size:13px;
color:#6b7280;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Dashboard Académico</h1>

<form method="POST">

<label for="username">Usuario</label>
<input type="text" id="username" name="username" required>

<label for="password">Contraseña</label>
<input type="password" id="password" name="password" required>

<button type="submit">Ingresar</button>

</form>

<div class="footer-text">
Sistema de gestión de estudiantes
</div>

</div>

</body>
</html>
