<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Estudiante</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1e3d;
      --blue: #2451b7;
      --blue-light: #3b6fd4;
      --accent: #4f9cf9;
      --danger: #e63946;
      --danger-soft: #fff0f0;
      --success: #2a9d5c;
      --bg: #f0f4fc;
      --surface: #ffffff;
      --surface2: #f7f9fe;
      --border: #dce5f5;
      --text: #1a2440;
      --text-mid: #4a5775;
      --text-light: #8a96b0;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(15,30,61,0.09);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--navy);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 24px rgba(10,20,50,0.22);
    }

    .logo { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 700; color: white; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

    nav a {
      font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.7);
      text-decoration: none; padding: 7px 13px; border-radius: 8px; transition: all 0.18s;
    }
    nav a:hover { background: rgba(255,255,255,0.1); color: white; }

    .page { max-width: 680px; margin: 0 auto; padding: 40px 24px; }

    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: var(--text-light); margin-bottom: 24px;
    }
    .breadcrumb a { color: var(--blue); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { color: var(--text-light); }

    .page-header { margin-bottom: 28px; }

    .page-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .page-subtitle { font-size: 0.88rem; color: var(--text-light); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .form-error {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      background: var(--danger-soft);
      border: 1px solid #fcccd0;
      border-radius: var(--radius-sm);
      font-size: 0.85rem; color: var(--danger); font-weight: 500;
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 7px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--surface);
      transition: border 0.18s, box-shadow 0.18s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,156,249,0.12);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    .section-gap { margin-top: 28px; margin-bottom: 16px; }

    .form-hint { font-size: 0.74rem; color: var(--text-light); margin-top: 5px; }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.86rem; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none; transition: all 0.18s;
    }

    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: var(--blue-light); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(36,81,183,0.3); }

    .btn-ghost {
      background: transparent; color: var(--text-mid);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    @media (max-width: 560px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div> Dashboard</div>
  <nav>
    <a href="/dashprincipal">← Dashboard</a>
  </nav>
</header>

<div class="page">

  <div class="breadcrumb">
    <a href="/dashprincipal">Dashboard</a>
    <span>›</span>
    <span>Registro de Estudiante</span>
  </div>

  <div class="page-header">
    <h1 class="page-title">Registrar Estudiante</h1>
    <p class="page-subtitle">Complete los campos para agregar un nuevo estudiante al sistema.</p>
  </div>

  <div class="card">

    {% if error %}
    <div class="form-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">

      <div class="section-label">Información Personal</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="txtnombre">Nombre completo</label>
          <input class="form-input" type="text" id="txtnombre" name="txtnombre" placeholder="Ej: Ana Martínez">
        </div>
        <div class="form-group">
          <label class="form-label" for="txtedad">Edad</label>
          <input class="form-input" type="number" id="txtedad" name="txtedad" placeholder="Ej: 20" min="15" max="80">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="txtcarrera">Carrera</label>
        <input class="form-input" type="text" id="txtcarrera" name="txtcarrera" placeholder="Ej: Ingeniería de Sistemas">
      </div>

      <div class="section-label section-gap">Calificaciones</div>

      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label" for="txtnota1">Nota 1</label>
          <input class="form-input" type="number" id="txtnota1" name="txtnota1" step="0.1" min="0" max="5" placeholder="0.0 – 5.0">
        </div>
        <div class="form-group">
          <label class="form-label" for="txtnota2">Nota 2</label>
          <input class="form-input" type="number" id="txtnota2" name="txtnota2" step="0.1" min="0" max="5" placeholder="0.0 – 5.0">
        </div>
        <div class="form-group">
          <label class="form-label" for="txtnota3">Nota 3</label>
          <input class="form-input" type="number" id="txtnota3" name="txtnota3" step="0.1" min="0" max="5" placeholder="0.0 – 5.0">
        </div>
      </div>
      <p class="form-hint">El promedio se calculará automáticamente al guardar.</p>

      <div class="actions">
        <a href="/dashprincipal" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Registrar Estudiante
        </button>
      </div>

    </form>
  </div>
</div>

</body>
</html>
